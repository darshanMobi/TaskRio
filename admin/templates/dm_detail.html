<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DM Conversation Detail - TaskRio Admin</title>
<link rel="icon" type="image/svg+xml" href="/admin/static/favicon.svg">
<link rel="alternate icon" href="/admin/static/favicon.ico">
<link rel="apple-touch-icon" href="/admin/static/apple-touch-icon.png">
<script>
(function () {
  var saved = localStorage.getItem('taskrio-theme');
  var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (dark) document.documentElement.setAttribute('data-theme', 'dark');
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/static/admin.css">
<link rel="stylesheet" href="/admin/static/dm_detail.css">
<link rel="stylesheet" href="/admin/static/dark-theme.css">
<link rel="stylesheet" href="/admin/static/theme-toggle.css">
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <a class="brand-logo-link" href="/admin" aria-label="Go to Dashboard">
        <img class="brand-logo brand-logo-light" src="/admin/static/logo.png" alt="MobiOfficeHQ TaskRio">
        <img class="brand-logo brand-logo-dark" src="/admin/static/logo-dark.png" alt="MobiOfficeHQ TaskRio">
      </a>
    </div>

    <nav class="nav">
      <a class="nav-item" href="/admin">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="currentColor"/><rect x="6.5" y="4" width="3" height="10" rx="1" fill="currentColor"/><rect x="11" y="6" width="3" height="8" rx="1" fill="currentColor"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="/admin/groups">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="5.5" r="2.2" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="6.5" r="1.7" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2 1.6-3.3 3.5-3.3S9 11 9 13M9.8 13c0-1.6 1-2.6 2.4-2.6s2.3 1 2.3 2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Groups
      </a>
      <a class="nav-item" href="/admin/tenants">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 13.5V4.8L8 2l5.5 2.8v8.7M6 13.5V9.5h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M1.5 13.5h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tenants
      </a>
      <a class="nav-item active" href="/admin/dms">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 7.6c0 3-2.7 5.4-6 5.4-.8 0-1.6-.1-2.3-.4L2.5 13.7l.9-2.6C2.5 10.2 2 9 2 7.6c0-3 2.7-5.4 6-5.4s6 2.4 6 5.4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        DMs
      </a>
      <a class="nav-item" href="/admin/analytics">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12l-4.6 5.4v4.1L6.6 14V8.4L2 3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Demo Funnel
      </a>
      <a class="nav-item" href="/admin/suggestions">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.8a4.6 4.6 0 00-2.6 8.4c.5.4.9 1 .9 1.6h3.4c0-.6.4-1.2.9-1.6A4.6 4.6 0 008 1.8z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6.5 14h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Suggestions
      </a>
      <a class="nav-item" href="/admin/reminders">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a4.3 4.3 0 00-4.3 4.3c0 2.2-.6 3.6-1.2 4.4h11c-.6-.8-1.2-2.2-1.2-4.4A4.3 4.3 0 008 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6.6 13.3a1.5 1.5 0 002.8 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Reminders
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item theme-toggle" id="themeToggle" aria-pressed="false" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="icon-sun">Light Mode</span>
        <span class="icon-moon">Dark Mode</span>
      </button>
      <hr class="theme-toggle-divider">
      <a class="nav-item logout" href="/admin/logout">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.5 5.5V3.6c0-.9-.7-1.6-1.6-1.6H4.1c-.9 0-1.6.7-1.6 1.6v8.8c0 .9.7 1.6 1.6 1.6h4.8c.9 0 1.6-.7 1.6-1.6v-1.9M7 8h7m0 0l-2.2-2.2M14 8l-2.2 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="page">

      <header class="page-header">
        <div>
          <div class="breadcrumb">
            <span class="breadcrumb-company">Demo Company</span>
            <span class="breadcrumb-sep">/</span>
            <a class="breadcrumb-link" href="/admin/dms">DMs</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current" id="dm-name">Loading…</span>
          </div>
          <div class="detail-meta">
            <span class="id-chip" id="dm-phone">—</span>
            <span id="dm-timezone"></span>
          </div>
        </div>
      </header>

      <div>
        <a href="/admin/dms" class="back-link">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2.5L3 6l4.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back to DMs
        </a>
      </div>

      <div class="stat-grid">
        <div class="stat-card accent-indigo">
          <span class="stat-label">Total Messages</span>
          <div class="stat-value" id="message-count">-</div>
        </div>
        <div class="stat-card accent-teal">
          <span class="stat-label">Timezone</span>
          <div class="stat-value" id="timezone" style="font-size:20px;">-</div>
        </div>
        <div class="stat-card accent-green">
          <span class="stat-label">First Seen</span>
          <div class="stat-value" id="first-seen" style="font-size:20px;">-</div>
        </div>
        <div class="stat-card accent-violet">
          <span class="stat-label">Last Activity</span>
          <div class="stat-value" id="last-activity" style="font-size:20px;">-</div>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Send message</h2>
        </div>
        <div class="panel-body">
          <textarea id="message-input" class="message-input" placeholder="Type your message here... Markdown is supported: *bold* _italic_ `code`"></textarea>
          <div class="markdown-help">
            <strong>Markdown:</strong> <code>*bold*</code> <code>_italic_</code> <code>`code`</code> <code>~strikethrough~</code>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
            <button class="btn btn-secondary" onclick="clearMessage()">Clear</button>
          </div>
          <div class="error-banner" id="error-banner"></div>
          <div class="success-banner" id="success-banner"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Recent messages</h2>
          <span class="panel-note">Last 100</span>
        </div>
        <div class="panel-body">
          <div class="messages-container" id="messages">
            <div class="placeholder">Loading messages…</div>
          </div>
        </div>
      </section>

    </div>
  </main>
</div>

<script>
    const waId = {{ wa_id | tojson }};

    function showError(message) {
        const el = document.getElementById('error-banner');
        el.textContent = message;
        el.style.display = message ? 'block' : 'none';
    }

    function showSuccess(message) {
        const el = document.getElementById('success-banner');
        el.textContent = message;
        el.style.display = message ? 'block' : 'none';
    }

    async function loadDMDetail() {
        try {
            const response = await fetch(`/admin/dm-detail/${encodeURIComponent(waId)}`);
            const data = await response.json();

            document.title = `${data.display_name || 'Unknown User'} — DM Detail`;
            document.getElementById('dm-name').textContent = data.display_name || 'Unknown User';
            document.getElementById('dm-phone').textContent = data.phone || data.wa_id;

            const timezoneBadge = document.getElementById('dm-timezone');
            timezoneBadge.innerHTML = data.timezone
                ? `<span class="internal-chip">${data.timezone}</span>${data.auto_detected ? '<span class="tz-auto-badge">auto</span>' : ''}`
                : '';

            document.getElementById('message-count').textContent = data.message_count.toLocaleString();
            document.getElementById('timezone').textContent = data.timezone || '—';
            document.getElementById('first-seen').textContent = data.first_seen ?
                new Date(data.first_seen).toLocaleDateString() : '—';
            document.getElementById('last-activity').textContent = data.last_activity ?
                new Date(data.last_activity).toLocaleString() : '—';

            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = '';

            if (!data.messages.length) {
                messagesContainer.innerHTML = '<div class="placeholder">No messages found</div>';
                return;
            }

            data.messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                const isBot = msg.kind === 'outbound';
                messageDiv.className = isBot ? 'message outbound' : 'message inbound';

                const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '';
                const sender = isBot ? '🤖 TaskRio' : msg.sender;

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <span class="message-sender">${sender}</span>
                        <span class="message-timestamp">${timestamp}</span>
                    </div>
                    <div class="message-bubble">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
                messagesContainer.appendChild(messageDiv);
            });
        } catch (error) {
            console.error('Failed to load DM detail:', error);
            document.getElementById('messages').innerHTML =
                '<div class="placeholder" style="color:var(--red, #c93b3b);">Failed to load conversation</div>';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        const sendBtn = document.getElementById('send-btn');

        showError('');
        showSuccess('');

        if (!message) {
            showError('Please type a message first');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="btn-spinner"></span>Sending…';

        try {
            const response = await fetch('/admin/dm-send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wa_id: waId, message }),
            });
            const data = await response.json();

            if (response.ok && data.success) {
                showSuccess('Message sent successfully!');
                clearMessage();
                setTimeout(loadDMDetail, 1000);
            } else {
                showError(`Failed to send: ${data.detail || 'Unknown error'}`);
            }
        } catch (error) {
            console.error('Send error:', error);
            showError('Failed to send message. Please try again.');
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
        }
    }

    function clearMessage() {
        document.getElementById('message-input').value = '';
    }

    loadDMDetail();

    const themeToggle = document.getElementById('themeToggle');
    function setTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
        themeToggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
    }
    setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
    themeToggle.addEventListener('click', function () {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('taskrio-theme', next);
        setTheme(next);
    });
</script>
</body>
</html>
